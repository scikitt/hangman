<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>행맨</title>
    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="./index.css" />
    </style>
  </head>
  <body>
    <div id="title">
      <h1>행맨 게임</h1>
    </div>
    <img id="hangman" src="../imgs/complete.png" width="300" />
    <div id="notice"></div>
    <br>
    <div id="login-box">
      <input
      type="text"
      name="nickname"
      id="login-nickname"
      placeholder="닉네임을 입력해 주세요."
      autofocus
    />
    <div>
    <input
      type="password"
      name="password"
      id="login-password"
      placeholder="비밀번호를 입력해 주세요."
      autofocus
    />
      <button onclick="login()">행맨 시작하기</button>
    </div>
    </div>
    <script src="../global.js"></script>
    <script src="./index.js"></script>
  </body>
</html>
